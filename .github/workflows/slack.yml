name: Slack Notifications

permissions:
  issues: read
  pull-requests: read
  discussions: read
  actions: read

on:
  workflow_dispatch:
  fork:
  discussion:
  discussion_comment:
  issues:
  issue_comment:
  pull_request_review_comment:
  pull_request_review:
  pull_request:
  watch:
  release:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["build", "Integration Tests", "Release", "Snapshot release on main", "Snapshot release", "Renovate auto-merge"]
    types:
      - completed

jobs:
  notify_slack:
    runs-on: self-hosted
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Set Event Message and Send Slack Notification
        env:
          CREATED_AT: ${{ github.event.created_at }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          REPO_NAME: ${{ github.repository }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_HTML_URL: ${{ github.event.html_url || '-' }}
          GITHUB_EVENT_ACTION: ${{ github.event.action }}
          SENDER_LOGIN: ${{ github.event.sender.login }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMPARE_URL: ${{ github.event.compare }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_HTML_URL: ${{ github.event.release.html_url }}
          WORKFLOW_RUN_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_HTML_URL: ${{ github.event.workflow_run.html_url }}
          DISCUSSION_HTML_URL: ${{ github.event.discussion.html_url }}
          COMMENT_HTML_URL: ${{ github.event.comment.html_url }}
          ISSUE_HTML_URL: ${{ github.event.issue.html_url }}
          PR_HTML_URL: ${{ github.event.pull_request.html_url }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REVIEW_HTML_URL: ${{ github.event.review.html_url }}
        run: |
          set -u

          # Strip newlines/carriage-returns from every value sourced from the GitHub
          # event payload before it is used to build $msg/$details, so a free-text
          # field such as a PR title can't break the single-line Slack message layout.
          GITHUB_EVENT_NAME=$(tr -d '\n\r' <<< "$GITHUB_EVENT_NAME")
          GITHUB_EVENT_HTML_URL=$(tr -d '\n\r' <<< "$GITHUB_EVENT_HTML_URL")
          GITHUB_EVENT_ACTION=$(tr -d '\n\r' <<< "$GITHUB_EVENT_ACTION")
          SENDER_LOGIN=$(tr -d '\n\r' <<< "$SENDER_LOGIN")
          REF_NAME=$(tr -d '\n\r' <<< "$REF_NAME")
          ACTOR=$(tr -d '\n\r' <<< "$ACTOR")
          COMPARE_URL=$(tr -d '\n\r' <<< "$COMPARE_URL")
          RELEASE_TAG_NAME=$(tr -d '\n\r' <<< "$RELEASE_TAG_NAME")
          RELEASE_HTML_URL=$(tr -d '\n\r' <<< "$RELEASE_HTML_URL")
          WORKFLOW_RUN_NAME=$(tr -d '\n\r' <<< "$WORKFLOW_RUN_NAME")
          WORKFLOW_RUN_HEAD_BRANCH=$(tr -d '\n\r' <<< "$WORKFLOW_RUN_HEAD_BRANCH")
          WORKFLOW_RUN_HTML_URL=$(tr -d '\n\r' <<< "$WORKFLOW_RUN_HTML_URL")
          DISCUSSION_HTML_URL=$(tr -d '\n\r' <<< "$DISCUSSION_HTML_URL")
          COMMENT_HTML_URL=$(tr -d '\n\r' <<< "$COMMENT_HTML_URL")
          ISSUE_HTML_URL=$(tr -d '\n\r' <<< "$ISSUE_HTML_URL")
          PR_HTML_URL=$(tr -d '\n\r' <<< "$PR_HTML_URL")
          PR_TITLE=$(tr -d '\n\r' <<< "$PR_TITLE")
          REVIEW_HTML_URL=$(tr -d '\n\r' <<< "$REVIEW_HTML_URL")

          msg="рџ”” New event of type *$GITHUB_EVENT_NAME* detected!"
          details="Details: $GITHUB_EVENT_HTML_URL"

          case "$GITHUB_EVENT_NAME" in
            fork)     msg="рџЌґ Repository was forked!";;
            watch)    msg="в­ђ *<${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>* starred the repository!";;

            push)
              msg="рџ“¦ New commit pushed to *$REF_NAME* by <${{ github.server_url }}/$ACTOR|$ACTOR>!"
              details="<$COMPARE_URL|View changes>"
            ;;

            release)
              case "$GITHUB_EVENT_ACTION" in
                published)
                  msg="рџљЂ Release *$RELEASE_TAG_NAME* published by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$RELEASE_HTML_URL"
                ;;

                prereleased)
                  msg="рџ”– Pre-release *$RELEASE_TAG_NAME* published by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$RELEASE_HTML_URL"
                ;;

                created)
                  msg="рџЏ·пёЏ Release *$RELEASE_TAG_NAME* created by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$RELEASE_HTML_URL"
                ;;

                edited)
                  msg="вњЏпёЏ Release *$RELEASE_TAG_NAME* was edited by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$RELEASE_HTML_URL"
                ;;

                deleted)
                  msg="рџ—‘пёЏ Release *$RELEASE_TAG_NAME* was deleted by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$RELEASE_HTML_URL"
                ;;
              esac
            ;;

            workflow_run)
              msg="вќЊ Workflow *$WORKFLOW_RUN_NAME* failed on branch *$WORKFLOW_RUN_HEAD_BRANCH*!"
              details="<$WORKFLOW_RUN_HTML_URL|View run>"
            ;;

            discussion)
              case "$GITHUB_EVENT_ACTION" in
                created)
                  msg="рџ’¬ New Discussion Created by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$DISCUSSION_HTML_URL"
                ;;

                edited)
                  msg="вњЏпёЏ Discussion was modified by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$DISCUSSION_HTML_URL"
                ;;

                closed)
                  msg="вњ… Discussion Closed by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$DISCUSSION_HTML_URL"
                ;;

                reopened)
                  msg="рџ”„ Discussion Reopened by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$DISCUSSION_HTML_URL"
                ;;

                *)
                  msg="рџ’¬ Discussion Event *$GITHUB_EVENT_ACTION* by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$DISCUSSION_HTML_URL"
                ;;
              esac
            ;;

            discussion_comment)
              case "$GITHUB_EVENT_ACTION" in
                created)
                  msg="рџ’¬ New comment was added to the discussion by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>."
                  details="Discussion $DISCUSSION_HTML_URL, comment $COMMENT_HTML_URL"
                ;;

                edited)
                  msg="пёЏпёЏвњЏпёЏ An existing comment in the discussion was edited by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>."
                  details="Discussion $DISCUSSION_HTML_URL, comment $COMMENT_HTML_URL"
                ;;

                deleted)
                  msg="рџ—‘ A comment was removed from the discussion by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>"
                  details="Discussion $DISCUSSION_HTML_URL"
                ;;
              esac
            ;;

            issues)
              case "$GITHUB_EVENT_ACTION" in
                opened)
                  msg="рџђ› New Issue Created by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$ISSUE_HTML_URL"
                ;;

                reopened)
                  msg="рџ”„ Issue Reopened by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$ISSUE_HTML_URL"
                ;;

                closed)
                  msg="вњ… Issue Closed by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$ISSUE_HTML_URL"
                ;;

                *)
                  msg="рџђ› Issue Event *$GITHUB_EVENT_ACTION* by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$ISSUE_HTML_URL"
                ;;
              esac
            ;;

            issue_comment)
              case "$GITHUB_EVENT_ACTION" in
                created)
                  msg="рџ’¬ New Issue Comment added by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$ISSUE_HTML_URL"
                ;;

                edited)
                  msg="вњЏпёЏ Issue Comment modified by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$ISSUE_HTML_URL"
                ;;

                deleted)
                  msg="рџ—‘пёЏ Issue Comment deleted by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$ISSUE_HTML_URL"
                ;;
              esac
            ;;


            pull_request)
              case "$GITHUB_EVENT_ACTION" in
                opened)
                  msg="рџ”Ђ New Pull Request was created by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$PR_HTML_URL"
                ;;

                reopened)
                  msg="в™»пёЏ Pull Request Reopened by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$PR_HTML_URL"
                ;;

                edited)
                  msg="вњЏпёЏ Pull Request Modified by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="$PR_HTML_URL"
                ;;

                closed)
                  if [ "$PR_MERGED" = "true" ]; then
                    msg="рџЋ‰ Pull Request Merged by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  else
                    msg="вќЊ Pull Request Closed by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  fi
                  details="$PR_HTML_URL"
                ;;

                *)
                  msg="рџ”Ђ Pull Request Event: *$GITHUB_EVENT_ACTION*!"
                  details="$PR_HTML_URL"
                ;;
              esac
            ;;

            pull_request_review)
              case "$GITHUB_EVENT_ACTION" in
                submitted)
                  msg="рџ’¬пёЏ A review was added to the Pull Request by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="PR: <$PR_HTML_URL|$PR_TITLE>, <$REVIEW_HTML_URL|Review>"
                ;;

                edited)
                  msg="вњЏпёЏпёЏ Pull Request review was modified by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="PR: <$PR_HTML_URL|$PR_TITLE>, <$REVIEW_HTML_URL|Review>"
                ;;

                dismissed)
                  msg="рџљ« Pull Request review was dismissed by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="PR: <$PR_HTML_URL|$PR_TITLE>"
                ;;
              esac
            ;;

            pull_request_review_comment)
              case "$GITHUB_EVENT_ACTION" in
                created)
                  msg="рџ’¬пёЏ A new comment was added to the Pull Request by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN>!"
                  details="PR: <$PR_HTML_URL|$PR_TITLE>, <$COMMENT_HTML_URL|Comment>"
                ;;

                edited)
                  msg="вњЏпёЏпёЏ A comment has been modified by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN> in the Pull Request!"
                  details="PR: <$PR_HTML_URL|$PR_TITLE>, <$COMMENT_HTML_URL|Comment>"
                ;;

                deleted)
                  msg="рџ—‘пёЏ A comment was deleted by <${{ github.server_url }}/$SENDER_LOGIN|$SENDER_LOGIN> in the Pull Request!"
                  details="PR: <$PR_HTML_URL|$PR_TITLE>"
                ;;
              esac
            ;;
          esac

          # $msg/$details/$CREATED_AT/$REPO_URL/$REPO_NAME are used directly below to build the
          # Slack payload in this same step and posted via curl - they are never written to
          # $GITHUB_ENV/$GITHUB_OUTPUT, so there is no environment-file injection sink to exploit
          # regardless of their content. json_escape guards against quotes/backslashes breaking
          # the JSON structure (newlines were already stripped above).
          json_escape() {
            local s=$1
            s=${s//\\/\\\\}
            s=${s//\"/\\\"}
            printf '%s' "$s"
          }

          printf -v payload '{"channel":"%s","blocks":[{"type":"section","text":{"type":"mrkdwn","text":"рџ”” *New event* %s рџ””"}},{"type":"section","text":{"type":"mrkdwn","text":"%s"}},{"type":"section","text":{"type":"mrkdwn","text":"*Repository:* <%s|%s> _(OSS)_"}},{"type":"section","text":{"type":"mrkdwn","text":"%s"}}]}' \
            "$SLACK_CHANNEL" "$(json_escape "$CREATED_AT")" "$(json_escape "$msg")" "$(json_escape "$REPO_URL")" "$(json_escape "$REPO_NAME")" "$(json_escape "$details")"

          curl -sf -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$payload"
