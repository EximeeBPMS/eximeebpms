# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/" # Location of package manifests
    schedule:
      interval: "daily"
      time: "20:00"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 2
    # Delay patch-level PRs by 5 days after release so a compromised/broken
    # patch has time to get pulled or flagged upstream before we auto-merge
    # it (see auto-merge.yml). Does not apply to Dependabot security updates
    # (CVE alerts always bypass cooldown) or to minor/major bumps, which
    # already require manual review regardless of age.
    cooldown:
      semver-patch-days: 5
    groups:
      spring:
        patterns:
          - "org.springframework.boot:*"
          - "org.springframework:*"
      httpcomponents:
        patterns:
          - "org.apache.httpcomponents*"
      tomcat:
        patterns:
          - "org.apache.tomcat:*"
      wildfly:
        patterns:
          - "org.wildfly*"
          - "wildfly.container.adapter.version"
      jackson:
        patterns:
          - "com.fasterxml.jackson*"
      logging:
        patterns:
          - "ch.qos.logback:*"
          - "org.slf4j:*"
      testing:
        patterns:
          - "org.junit*"
          - "org.mockito*"
          - "org.assertj*"
          - "org.xmlunit:*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "20:00"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "actions/*"
      third-party-actions:
        patterns:
          - "*"
