name: build

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  check:
    name: Check
    runs-on: self-hosted
    permissions:
      contents: read
    outputs:
      skip_build: ${{ steps.verify.outputs.skip_build }}
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get list of changed files
        id: verify
        run: |
          echo "Checking for relevant file changes..."

          git fetch origin main
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)

          echo "Changed files:"
          echo "$CHANGED_FILES"

          IGNORED_PATTERNS=(
            ".github/"
            ".md"
            "settings/"
            ".gitignore"
            "LICENSE"
            "NOTICE"
          )

          RELEVANT_FILES=()

          for FILE in $CHANGED_FILES; do
            SKIP=false

            # exception for build.yml
            if [[ "$FILE" == ".github/workflows/build.yml" ]]; then
              RELEVANT_FILES+=("$FILE")
              continue
            fi

            for PATTERN in "${IGNORED_PATTERNS[@]}"; do
              if [[ "$FILE" == "$PATTERN"* ]] || [[ "$FILE" == *"$PATTERN" ]]; then
                SKIP=true
                break
              fi
            done

            if [ "$SKIP" = false ]; then
              RELEVANT_FILES+=("$FILE")
            fi
          done

          echo "Relevant files:"
          printf "%s\n" "${RELEVANT_FILES[@]}"

          if [ ${#RELEVANT_FILES[@]} -eq 0 ]; then
            echo "No relevant files changed — skipping build."
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "Relevant files found — proceeding with build."
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi
      - name: Stop early if no relevant files
        if: steps.verify.outputs.skip_build == 'true'
        run: |
          echo "Nothing to do. Exiting early."
          exit 0

  build:
    name: Build
    needs: check
    if: needs.check.outputs.skip_build == 'false'
    runs-on: self-hosted
    permissions:
      contents: read
      checks: write
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK
        run: |
          if java -version 2>&1 | grep -qE '"17\.'; then
            echo "Java 17 already installed"
          else
            echo "Java 17 not found, installing via package manager..."
            sudo apt-get update -q
            sudo apt-get install -y openjdk-17-jdk
          fi
          JAVA_HOME=$(java -XshowSettings:properties -version 2>&1 | grep 'java.home' | awk '{print $3}')
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH
          java -version

      - name: Create custom settings.xml
        run: |
          mkdir -p ~/.m2
          cat <<EOF > ~/.m2/settings.xml
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache SonarQube packages
        uses: actions/cache@v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Remove corrupted Maven cache files
        run: find ${{ github.workspace }}/.m2/repository -name "*.xml" -empty -delete 2>/dev/null || true

      - name: Maven Build
        id: maven-build
        shell: bash
        run: |
          ./mvnw -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=EximeeBPMS_eximeebpms
          ./mvnw --non-recursive org.jacoco:jacoco-maven-plugin:report-aggregate
        env:
          MAVEN_OPTS: -Dmaven.repo.local=${{ github.workspace }}/.m2/repository
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@db71d41eb79864e25ab0337e395c352e84523afe # v4
        with:
          report_paths: ${{ github.workspace }}/**/target/surefire-reports/*.xml
          require_passed_tests: true

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: surefire-reports
          path: ${{ github.workspace }}/**/target/surefire-reports/**
          retention-days: 30
