name: Bug report
description: Something isn't working as expected
labels: ["needs-triage", "bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can a maintainer reproduce this?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: EximeeBPMS version
      placeholder: e.g. 1.2.0
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Modules used, database, application server / runtime.
    validations:
      required: false
