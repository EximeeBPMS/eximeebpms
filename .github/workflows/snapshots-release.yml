name: Snapshot release

on:
  workflow_call:
    secrets:
      GPG_PRIVATE_KEY:
        required: true
      GPG_PASSPHRASE:
        required: true
      CPP_USERNAME:
        required: true
      CPP_PASSWORD:
        required: true
      GH_TOKEN:
        required: true

jobs:
  snapshot-release:
    permissions:
      contents: write
      packages: write

    runs-on: github-actions-runner-new
    steps:
      - name: Set isolated local repo
        run: |
          # github-actions-runner-new is shared with build.yml/snapshots-on-main.yml/etc.
          # An isolated, per-run local repo avoids corrupting ~/.m2/repository metadata
          # (e.g. maven-metadata-local.xml) via concurrent writes from other workflows.
          echo "MAVEN_REPO_LOCAL=${{ runner.temp }}/m2-repo-${{ github.run_id }}" >> $GITHUB_ENV

      - name: Check out the latest main branch
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create custom settings.xml
        run: |
          mkdir -p ~/.m2-snapshot-release
          cat <<EOF > ~/.m2-snapshot-release/settings.xml
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${CPP_USERNAME}</username>
                <password>${CPP_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
          cat ~/.m2-snapshot-release/settings.xml
        env:
          CPP_USERNAME: ${{ secrets.CPP_USERNAME }}
          CPP_PASSWORD: ${{ secrets.CPP_PASSWORD }}

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 --decode > private.key
          gpg --batch --import private.key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Build and deploy snapshots
        run: |
          ./mvnw clean deploy -B -Prelease,sonatype-oss-release -DskipTests --settings ~/.m2-snapshot-release/settings.xml -Dmaven.repo.local="${MAVEN_REPO_LOCAL}"
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

