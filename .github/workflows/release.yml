name: Release

permissions:
  contents: write
  packages: write
  id-token: write  # required for Sigstore keyless signing

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version to release'
        required: true
      development_version:
        description: 'Next snapshot version'
        required: true

jobs:
  release:
    runs-on: github-actions-runner-new
    steps:
      - name: Determine user and set secret
        run: |
          echo "GITHUB_PAT_USER=SECRET_PAT_${{ github.actor }}" >> $GITHUB_ENV

      - name: Check out the code
        uses: actions/checkout@v7
        with:
          token: ${{ secrets[env.GITHUB_PAT_USER] }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create custom settings.xml
        run: |
            mkdir -p ~/.m2
            cat <<EOF > ~/.m2/settings.xml
            <settings>
              <servers>
                <server>
                  <id>central</id>
                  <username>${CPP_USERNAME}</username>
                  <password>${CPP_PASSWORD}</password>
                </server>
                <server>
                  <id>github</id>
                  <username>${GITHUB_ACTOR}</username>
                  <password>${GITHUB_TOKEN}</password>
                </server>
              </servers>
            </settings>
            EOF
            cat ~/.m2/settings.xml
        env:
          CPP_USERNAME: ${{ secrets.CPP_USERNAME }}
          CPP_PASSWORD: ${{ secrets.CPP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets[env.GITHUB_PAT_USER] }}

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 --decode > private.key
          gpg --batch --import private.key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Configure Git user
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions@github.com'

      - name: Release prepare
        run: |
          ./mvnw release:prepare -B -Darguments="-DskipTests" \
            -Prelease,distro,distro-ce,javadocs,distro-serverless,distro-tomcat,distro-wildfly,distro-webjar,distro-run,distro-starter,check-engine,check-webapps,sonatype-oss-release \
            -DtagNameFormat=v@{project.version} \
            -DreleaseVersion=${{ github.event.inputs.release_version }} \
            -DdevelopmentVersion=${{ github.event.inputs.development_version }}-SNAPSHOT \
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GITHUB_TOKEN: ${{ secrets[env.GITHUB_PAT_USER] }}

      - name: Release perform
        run: |
          ./mvnw release:perform -Dgoals="" \
          -Darguments="-Psbom -DskipTests"
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GITHUB_TOKEN: ${{ secrets[env.GITHUB_PAT_USER] }}

      - name: Deploy base libs
        run: |
          cd target/checkout
          ./mvnw deploy -Prelease,sonatype-oss-release -B -DskipTests
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GITHUB_TOKEN: ${{ secrets[env.GITHUB_PAT_USER] }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Collect SBOM
        run: |
          VERSION="${{ github.event.inputs.release_version }}-ee"
          cp target/checkout/target/bom.json "sbom-${VERSION}.cdx.json"
          cp target/checkout/target/bom.xml  "sbom-${VERSION}.cdx.xml"

      - name: GPG-sign SBOM
        run: |
          for f in sbom-*.cdx.json sbom-*.cdx.xml; do
            gpg --batch --yes --armor \
                --pinentry-mode loopback \
                --passphrase "$GPG_PASSPHRASE" \
                --detach-sign "$f"
          done
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sign SBOM with Sigstore (cosign keyless)
        run: |
          for f in sbom-*.cdx.json sbom-*.cdx.xml; do
            cosign sign-blob --yes "$f" \
                --bundle "${f}.sigstore.bundle"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ github.event.inputs.release_version }}
          tag_name: v${{ github.event.inputs.release_version }}
          draft: false
          prerelease: false
          files: |
            sbom-*.cdx.json
            sbom-*.cdx.json.asc
            sbom-*.cdx.json.sigstore.bundle
            sbom-*.cdx.xml
            sbom-*.cdx.xml.asc
            sbom-*.cdx.xml.sigstore.bundle
          body: |
            Release generated on ${{ github.event.head_commit.timestamp }}
            with commit message: ${{ github.event.head_commit.message }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

#  Invoking snapshot release to provide the necessary snapshots for testing in CustomJacksonDateFormatTest
  call-snapshot-release:
    needs: release
    permissions:
      contents: write
      packages: write

    uses: ./.github/workflows/snapshots-release.yml

    secrets:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      CPP_USERNAME: ${{ secrets.CPP_USERNAME }}
      CPP_PASSWORD: ${{ secrets.CPP_PASSWORD }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
