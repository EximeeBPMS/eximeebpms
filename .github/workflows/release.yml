name: Release

permissions:
  contents: write
  packages: write
  id-token: write  # required for Sigstore keyless signing

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version to release'
        required: true
      development_version:
        description: 'Next snapshot version'
        required: true

jobs:
  release:
    runs-on: github-actions-runner-new
    steps:
      - name: Determine user and set secret
        run: |
          echo "GITHUB_PAT_USER=SECRET_PAT_${{ github.actor }}" >> $GITHUB_ENV
          # github-actions-runner-new is shared with build.yml/snapshots-on-main.yml/etc.
          # An isolated, per-run local repo avoids corrupting ~/.m2/repository metadata
          # (e.g. maven-metadata-local.xml) via concurrent writes from other workflows.
          echo "MAVEN_REPO_LOCAL=${{ runner.temp }}/m2-repo-${{ github.run_id }}" >> $GITHUB_ENV

      - name: Check out the code
        uses: actions/checkout@v7
        with:
          token: ${{ secrets[env.GITHUB_PAT_USER] }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create custom settings.xml
        run: |
            mkdir -p ~/.m2-release
            cat <<EOF > ~/.m2-release/settings.xml
            <settings>
              <servers>
                <server>
                  <id>central</id>
                  <username>${CPP_USERNAME}</username>
                  <password>${CPP_PASSWORD}</password>
                </server>
                <server>
                  <id>github</id>
                  <username>${GITHUB_ACTOR}</username>
                  <password>${GITHUB_TOKEN}</password>
                </server>
              </servers>
            </settings>
            EOF
        env:
          CPP_USERNAME: ${{ secrets.CPP_USERNAME }}
          CPP_PASSWORD: ${{ secrets.CPP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets[env.GITHUB_PAT_USER] }}

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 --decode > private.key
          gpg --batch --import private.key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Configure Git user
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'github-actions@github.com'

      - name: Release prepare
        run: |
          ./mvnw release:prepare -B --settings ~/.m2-release/settings.xml -Dmaven.repo.local="${MAVEN_REPO_LOCAL}" -Darguments="-DskipTests -Dmaven.repo.local=${MAVEN_REPO_LOCAL}" \
            -Prelease,distro,distro-ce,javadocs,distro-serverless,distro-tomcat,distro-wildfly,distro-webjar,distro-run,distro-starter,check-engine,check-webapps,sonatype-oss-release \
            -DtagNameFormat=v@{project.version} \
            -DreleaseVersion=${{ github.event.inputs.release_version }} \
            -DdevelopmentVersion=${{ github.event.inputs.development_version }}-SNAPSHOT \
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GITHUB_TOKEN: ${{ secrets[env.GITHUB_PAT_USER] }}

      - name: Release perform
        run: |
          ./mvnw release:perform --settings ~/.m2-release/settings.xml -Dmaven.repo.local="${MAVEN_REPO_LOCAL}" -Dgoals="" \
          -Darguments="-DskipTests -Dmaven.repo.local=${MAVEN_REPO_LOCAL}"
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GITHUB_TOKEN: ${{ secrets[env.GITHUB_PAT_USER] }}

      - name: Deploy base libs (stage locally, no network)
        run: |
          cd target/checkout
          ./mvnw deploy -Prelease,sonatype-oss-release -B --settings ~/.m2-release/settings.xml -Dmaven.repo.local="${MAVEN_REPO_LOCAL}" -DskipTests \
            -DaltDeploymentRepository=local::file:$(pwd)/target/staging-deploy
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GITHUB_TOKEN: ${{ secrets[env.GITHUB_PAT_USER] }}

      - name: Generate aggregate SBOM
        run: |
          cd target/checkout
          ./mvnw package -Psbom -B --settings ~/.m2-release/settings.xml -Dmaven.repo.local="${MAVEN_REPO_LOCAL}" -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets[env.GITHUB_PAT_USER] }}

      - name: Publish staged artifacts to Maven Central (JReleaser)
        # Pinned to a commit SHA, not @v2: this is a self-hosted runner, which caches actions
        # under _work/_actions keyed by ref string and can keep reusing an already-cached
        # checkout for a moving branch ref instead of re-resolving it. That silently ignored
        # java-opts below even after it was pushed and live on GitHub. A distinct ref (this SHA)
        # forces a fresh fetch. Corresponds to jreleaser/release-action v2.5.0.
        uses: jreleaser/release-action@97b5e2f0e845de2fe1dbbdf451ac6a21233fafff
        with:
          version: '1.25.0' # pinned: 'latest' (default) resolves via jreleaser.org, unreachable from this runner
          # Default JVM heap is too small to multipart-encode a several-hundred-MB bundle (feign
          # copies it into a second in-memory buffer while form-encoding, needing ~2-3x the file
          # size in heap) - fails with "OutOfMemoryError: Java heap space" without this.
          java-opts: '-Xmx6144m'
          working-directory: target/checkout
          arguments: deploy
        env:
          JRELEASER_PROJECT_VERSION: ${{ github.event.inputs.release_version }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.CPP_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.CPP_PASSWORD }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Collect SBOM
        run: |
          VERSION="${{ github.event.inputs.release_version }}"
          cp target/checkout/target/bom.json "sbom-${VERSION}.cdx.json"
          cp target/checkout/target/bom.xml  "sbom-${VERSION}.cdx.xml"

      - name: GPG-sign SBOM
        run: |
          for f in sbom-*.cdx.json sbom-*.cdx.xml; do
            gpg --batch --yes --armor \
                --pinentry-mode loopback \
                --passphrase "$GPG_PASSPHRASE" \
                --detach-sign "$f"
          done
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sign SBOM with Sigstore (cosign keyless)
        run: |
          for f in sbom-*.cdx.json sbom-*.cdx.xml; do
            cosign sign-blob --yes "$f" \
                --bundle "${f}.sigstore.bundle"
          done

      - name: Get release commit info
        id: release_commit
        run: |
          TAG="v${{ github.event.inputs.release_version }}"
          {
            echo "timestamp=$(git log -1 --format=%cI "$TAG")"
            echo "message<<COMMIT_EOF"
            git log -1 --format=%s "$TAG"
            echo "COMMIT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ github.event.inputs.release_version }}
          tag_name: v${{ github.event.inputs.release_version }}
          draft: false
          prerelease: false
          files: |
            sbom-*.cdx.json
            sbom-*.cdx.json.asc
            sbom-*.cdx.json.sigstore.bundle
            sbom-*.cdx.xml
            sbom-*.cdx.xml.asc
            sbom-*.cdx.xml.sigstore.bundle
          body: |
            Release generated on ${{ steps.release_commit.outputs.timestamp }}
            with commit message: ${{ steps.release_commit.outputs.message }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

#  Invoking snapshot release to provide the necessary snapshots for testing in CustomJacksonDateFormatTest
  call-snapshot-release:
    needs: release
    permissions:
      contents: write
      packages: write

    uses: ./.github/workflows/snapshots-release.yml

    secrets:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      CPP_USERNAME: ${{ secrets.CPP_USERNAME }}
      CPP_PASSWORD: ${{ secrets.CPP_PASSWORD }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
